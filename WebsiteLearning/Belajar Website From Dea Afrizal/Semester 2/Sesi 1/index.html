<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesi 1</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@844&family=Poppins&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"

<body>
    <div class="container">

                <h1 class="title">Youtube</h1>
                <i class="fa-brands fa-youtube icons"></i>
                <p class="description">Entong Youtube</p>
                <button class="btn">FOLLOW</button>
            </div>
            <div class="card text-center">
                <h1 class="title">Tiktok</h1>
                <i class="fa-brands fa-tiktok icons"></i>
                <p class="description">Entong Tiktok</p>
                <button class="btn">FOLLOW</button>
            </div>
            <div class="card text-center">
                <h1 class="title">Facebook</h1>
                <i class="fa-brands fa-facebook icons"></i>
                <p class="description">Entong Facebook</p>
                <button class="btn">FOLLOW</button>
            </div>
            <div class="card text-center">
                <h1 class="title">Google</h1>
                <i class="fa-brands fa-google icons"></i>
                <p class="description">Google Pencarian</p>
                <button class="btn">FOLLOW</button>

        </div>
